<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temprature converter</title>
    <link rel="stylesheet" href="style.css">
    
</head>
<body>
    <div class="main">
        <h1>Temperature Converter</h1>
        <form >
            <label for="celsius">Celsius:</label>
            <input type="number" id="celsius" name="celsius">
            <button type="button" onclick="convertToFahrenheit()">Convert To Fahrenheit</button>
            <p id="fahrenheit"></p>
            <label for="fahrenheit">Fahrenheit:</label>
            <input type="number" id="fahrenheitInput" name="fahrenheit">
            <button type="button" onclick="convertToCelsius()">Convert to Celsius</button>
            <p id="celsiusOutput"></p>
        </form>
    </div>
    <script src="script.js"></script>
</body>
</html>
